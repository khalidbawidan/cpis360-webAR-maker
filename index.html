<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR Experience | khalid bawidan</title>
    
    <!-- Modern Google Font for UI -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Stable A-Frame and AR.js (No experimental branches) -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <!-- UI Interaction Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startBtn = document.getElementById('start-btn');
            const overlay = document.getElementById('ui-overlay');
            
            startBtn.addEventListener('click', () => {
                // Fade out the overlay smoothly
                overlay.style.opacity = '0';
                setTimeout(() => { 
                    overlay.style.display = 'none'; 
                }, 500); // Wait for the transition to finish
            });
        });
    </script>
</head>

<body>
    
    <!-- Beautiful Glassmorphism UI Overlay -->
    <div id="ui-overlay" class="overlay">
        <div class="glass-panel">
            <h1>مرحباً بك في عالم AR</h1>
            <p>مشروع الطالب: خالد باعويضان (khalid bawidan)</p>
            
            <div class="instructions">
                <p>1. اسمح باستخدام الكاميرا 📷</p>
                <p>2. وجّه الكاميرا نحو علامة Hiro المطبوعة ⬛</p>
                <p>3. استمتع بالتجربة الثلاثية الأبعاد ✨</p>
            </div>
            
            <button id="start-btn" class="glow-on-hover">ابدأ التجربة الآن</button>
        </div>
    </div>

    <!-- Minimal, clean A-Frame Scene -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        
        <!-- Adding nice lighting for realistic 3D appearance -->
        <a-entity light="type: ambient; color: #BBB; intensity: 0.6"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 1; castShadow: true" position="-1 2 1"></a-entity>

        <a-marker preset="hiro">
            
            <!-- 1. Floating Centerpiece (Icosahedron) with beautiful glass/metal look -->
            <a-icosahedron position="0 0.5 0" radius="0.4"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear"
                animation__float="property: position; to: 0 0.8 0; dir: alternate; loop: true; dur: 2000; easing: easeInOutSine"
                material="color: #00E5FF; metalness: 0.8; roughness: 0.2; opacity: 0.9; transparent: true">
            </a-icosahedron>

            <!-- 2. Orbiting Torus Knot around the centerpiece -->
            <a-torus-knot position="0 0.5 0" radius="0.3" radius-tubular="0.02" p="2" q="3"
                animation="property: rotation; to: 360 360 0; loop: true; dur: 8000; easing: linear"
                material="color: #FF3366; metalness: 0.5; roughness: 0.3">
            </a-torus-knot>

            <!-- 3. Ground shadow/glow effect to anchor the scene visually -->
            <a-circle position="0 0 0" radius="1.2" rotation="-90 0 0" 
                material="color: #000; opacity: 0.4; transparent: true"
                animation="property: scale; to: 1.1 1.1 1.1; dir: alternate; loop: true; dur: 2000; easing: easeInOutSine">
            </a-circle>

            <!-- 4. Text - Khalid Bawidan floating nicely -->
            <a-text value="khalid bawidan" position="0 1.2 0" rotation="-90 0 0" align="center" 
                color="#FFFFFF" scale="1.5 1.5 1.5"
                animation="property: position; to: 0 1.3 0; dir: alternate; loop: true; dur: 1500; easing: easeInOutQuad">
            </a-text>

        </a-marker>

        <!-- The Camera -->
        <a-entity camera></a-entity>
        
    </a-scene>
</body>
</html>
